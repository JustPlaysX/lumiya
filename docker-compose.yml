services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: verwaltungsbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      TEST_GUILD_ID: ${TEST_GUILD_ID:-}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/verwaltungsbot
      NODE_ENV: production
      LOG_LEVEL: info

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      bot:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/verwaltungsbot
      AUTH_DISCORD_ID: ${CLIENT_ID}
      AUTH_DISCORD_SECRET: ${AUTH_DISCORD_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_TOKEN}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-https://lumiya.justplaysx.de}
      # Nötig hinter Reverse-Proxy (Caddy), damit Auth.js X-Forwarded-Host vertraut
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    # Kein Host-Port nötig – Caddy erreicht "web" über das interne Netzwerk.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
