# nginx-Server-Block für das Lumiya-Web-Portal.
# Ablage z.B.: /etc/nginx/sites-available/lumiya.justplaysx.de.conf
# aktivieren:  ln -s ../sites-available/lumiya.justplaysx.de.conf /etc/nginx/sites-enabled/
# HTTPS-Zertifikat danach mit certbot einrichten (siehe DEPLOYMENT.md).

server {
    listen 80;
    listen [::]:80;
    server_name lumiya.justplaysx.de;

    # certbot legt hier später die Weiterleitung auf HTTPS an.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

